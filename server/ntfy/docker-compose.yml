# 布布时光机 · 家庭推送（自托管 ntfy）
# 「爸爸刚记录了 3 张照片」实时推到全家手机/手表。全部跑在自己家 mini，不出家门。
#
# 部署：
#   cd server/ntfy && docker compose up -d
# 家人订阅：在手机装 ntfy app（App Store / Play），添加服务器 http://<mini的tailscale-ip>:8095，
#   订阅话题 bubu-family。Apple Watch 会随 iPhone 通知一起转发，抬腕即见。
#
# 安全：仅 Tailscale 内网可达；话题名当口令，别设成公开可猜的词。
services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: bubu-ntfy
    command:
      - serve
    environment:
      - NTFY_BASE_URL=http://127.0.0.1:8095
      - NTFY_LISTEN_HTTP=:8095
      - NTFY_BEHIND_PROXY=false
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all   # 默认拒绝，仅授权账号可发布/订阅
      - NTFY_AUTH_FILE=/var/lib/ntfy/user.db
      - NTFY_CACHE_FILE=/var/lib/ntfy/cache.db
    volumes:
      - ./data:/var/lib/ntfy
    ports:
      - "8095:8095"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:8095/v1/health -O - | grep -q healthy || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
