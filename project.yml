name: BubuTimeMachine
options:
  bundleIdPrefix: com.bubu
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES

targets:
  BubuTimeMachine:
    type: application
    platform: iOS
    sources:
      - path: BubuTimeMachine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bubu.timemachine
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: 布布时光机
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 布布时光机需要访问相册，帮你把布布的照片和视频保存进时光轴。
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 布布时光机需要使用麦克风，记录布布的声音和家人想对她说的话。
        INFOPLIST_KEY_NSCameraUsageDescription: 布布时光机需要使用相机，随手拍下布布此刻的样子。
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: 布布时光机会用照片里的位置信息，自动标注每个瞬间发生的地方。
        TARGETED_DEVICE_FAMILY: "1"
