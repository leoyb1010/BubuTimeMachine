name: BubuTimeMachine
options:
  bundleIdPrefix: com.bubu
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  postGenCommand: ./scripts/suppress-nonapp-schemes.sh

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "48H5Y3LNUK"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "2026061304"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES

targets:
  BubuTimeMachine:
    type: application
    platform: iOS
    sources:
      - path: BubuTimeMachine
        excludes:
          - "Info.plist"
          - "BubuTimeMachine.entitlements"
    entitlements:
      path: BubuTimeMachine/BubuTimeMachine.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bubu.timemachine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bubu.timemachine
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BubuTimeMachine/Info.plist
        CODE_SIGN_ENTITLEMENTS: BubuTimeMachine/BubuTimeMachine.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: BubuWidgetsExtension
        embed: true

  BubuWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      # Widget 自身代码
      - path: BubuWidgets
        excludes:
          - "BubuWidgets.entitlements"
          - "Info.plist"
      # 复用主 App 的共享层（均为 Foundation/SwiftData/AppIntents，extension 安全）
      - path: BubuTimeMachine/Models
      - path: BubuTimeMachine/App/BubuStorage.swift
      - path: BubuTimeMachine/App/SharedModelContainer.swift
      - path: BubuTimeMachine/App/SharedDefaults.swift
      - path: BubuTimeMachine/App/BubuAppIntents.swift
      - path: BubuTimeMachine/App/BubuActivityAttributes.swift
      - path: BubuTimeMachine/Services/EntryWriter.swift
    entitlements:
      path: BubuWidgets/BubuWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bubu.timemachine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bubu.timemachine.widgets
        CODE_SIGN_ENTITLEMENTS: BubuWidgets/BubuWidgets.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BubuWidgets/Info.plist
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  BubuTimeMachineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BubuTimeMachineTests
    dependencies:
      - target: BubuTimeMachine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bubu.timemachine.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BubuTimeMachine.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BubuTimeMachine"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  BubuTimeMachine:
    build:
      targets:
        BubuTimeMachine: all
        BubuTimeMachineTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BubuTimeMachineTests
