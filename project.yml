name: BubuTimeMachine
options:
  bundleIdPrefix: com.bubu
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES

targets:
  BubuTimeMachine:
    type: application
    platform: iOS
    sources:
      - path: BubuTimeMachine
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bubu.timemachine
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BubuTimeMachine/Info.plist
        TARGETED_DEVICE_FAMILY: "1"

  BubuTimeMachineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BubuTimeMachineTests
    dependencies:
      - target: BubuTimeMachine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bubu.timemachine.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BubuTimeMachine.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BubuTimeMachine"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  BubuTimeMachine:
    build:
      targets:
        BubuTimeMachine: all
        BubuTimeMachineTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BubuTimeMachineTests
